spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jinyapp_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
      cache: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jpa:
    hibernate:
      ddl-auto: update  # 개발 중에는 update, 배포 시엔 validate 또는 none 추천
    show-sql: false       # 콘솔에 SQL 쿼리 출력 (개발 편의용)
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
logging:
  level:
    com.jiny.jinyapp: debug

upload:
  path: C:/jinyapp/uploads
