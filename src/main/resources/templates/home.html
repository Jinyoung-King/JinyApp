<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{layout/base}">
<head>
    <title>JinyApp: Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<!-- ✅ 여기를 base.html의 th:insert="~{::content}"와 연결 -->
<section layout:fragment="content">
    <h1>JinyApp에 오신 걸 환영합니다 🎉</h1>


    <div th:if="${session.loginUser != null}">
        <p><strong th:text="${session.loginUser.nickname}">사용자</strong>님, 반갑습니다!</p>
    </div>

    <!-- 인기 게시글 카드 -->
    <div class="card">
        <h3>🔥 인기 게시글 Top 5</h3>
        <ul>
            <li th:each="post : ${topPosts}">
                <a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">제목</a>
                <span th:text="'조회수: ' + ${post.viewCount}">조회수</span>
            </li>
        </ul>
    </div>

    <!-- 최신 게시글 카드 -->
    <div class="card">
        <h3>🆕 최신 게시글</h3>
        <ul>
            <li th:each="post : ${recentPosts}">
                <a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">제목</a>
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
            </li>
        </ul>
    </div>

    <!-- 통계 카드 -->
    <div class="card stats-box">
        <div class="stat">
            <strong th:text="${todayVisitors}">0</strong>
            오늘 방문자
        </div>
        <div class="stat">
            <strong th:text="${totalVisitors}">0</strong>
            전체 방문자
        </div>
    </div>


</section>

</body>
<!-- ✅ 여기에 개별 CSS 블록 -->
<th:block th:fragment="css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>
</html>
