<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="form-container">
    <h1>게시글 작성</h1>

    <form th:action="@{/posts/form}" th:object="${post}" method="post" enctype="multipart/form-data">
        <label for="title">제목</label>
        <input type="text" id="title" th:field="*{title}" placeholder="제목" required/>

        <label for="content">내용</label>
        <textarea id="content" th:field="*{content}" rows="10" placeholder="내용" required></textarea>

        <input type="file" name="image"> <!-- 이미지 첨부 -->

        <label for="pw-field">
            <input type="checkbox" name="secret"
                   onchange="document.getElementById('pw-field').style.display = this.checked ? 'block' : 'none'">
            비밀글로 설정
        </label>
        <div id="pw-field" style="display: none;">
            <label>
                <input type="password" name="password" placeholder="비밀번호 입력">
            </label>
        </div>


        <div class="button-group">
            <button type="submit" class="submit-button">등록</button>
            <a th:href="@{/posts}" class="cancel-button">취소</a>
        </div>
    </form>
</div>

</body>
</html>
