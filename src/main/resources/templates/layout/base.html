<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">기본 제목</title>
    <!-- ✅ 공통 CSS -->
    <link rel="stylesheet" th:href="@{/css/common.css}">

    <!-- ✅ Bootstrap 예시 (CDN 방식) -->
    <!--    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"-->
    <!--          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7sLxfp+u7xRUE9zYlR+v9huXoVI+0fGURRx"-->
    <!--          crossorigin="anonymous" />-->
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ 개별 페이지에서 삽입할 CSS -->
<!--    <th:block th:replace="~{::css}"  th:if="${#fragments.hasFragment('css')}"/>-->
    <th:block th:insert="~{::css}" />
</head>
<body>
<!-- ✅ 공통 헤더 삽입 -->
<!--<th:block th:replace="layout/header :: header"/>-->
<th:block th:replace="~{layout/header :: header}"/>

<!-- ✅ 이 부분에서 외부 템플릿의 layout:fragment="content"를 삽입함 -->
<main layout:fragment="content">
    <!-- 기본 콘텐츠가 필요하면 여기에 -->
</main>

<!-- ✅ 공통 푸터 삽입 -->
<!--<th:block th:replace="layout/footer :: footer"/>-->
<th:block th:replace="~{layout/footer :: footer}"/>

<!-- ✅ 공통 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ 개별 페이지에서 삽입할 JS -->
<th:block th:replace="~{::script}"/>
</body>
</html>
